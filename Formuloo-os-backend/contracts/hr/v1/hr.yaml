openapi: 3.0.3
info:
  title: Formuloo OS — HR Service API
  version: 2.2.0
  description: Service de gestion des Ressources Humaines de Formuloo OS. Gère les
    employés, postes, départements, contrats, congés, présences et fiches de paie
    SYSCOHADA. Toutes les données sont isolées par tenant_id (JWT).
    Notifications email automatiques (approbation/rejet congés, validation paie).
    Génération PDF bulletins de paie (GET /payroll/{id}/pdf/).
paths:
  /api/v1/hr/contrats/:
    get:
      operationId: v1_hr_contrats_list
      description: Retourne la liste paginée des contrats du tenant.
      summary: Lister les contrats
      tags:
      - Contrats
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contrat'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Accès refusé
          description: ''
    post:
      operationId: v1_hr_contrats_create
      description: |-
        GET  /api/v1/hr/contrats/ — Liste des contrats
        POST /api/v1/hr/contrats/ — Créer un contrat
      summary: Créer un contrat
      tags:
      - Contrats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContratCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContratCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContratCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contrat'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Accès refusé
          description: ''
  /api/v1/hr/contrats/{id}/:
    get:
      operationId: v1_hr_contrats_retrieve
      description: |-
        GET    /api/v1/hr/contrats/{id}/ — Détail
        PUT    /api/v1/hr/contrats/{id}/ — Modifier
        DELETE /api/v1/hr/contrats/{id}/ — Résilier
      summary: Détail d'un contrat
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Contrats
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contrat'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Accès refusé
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Contrat introuvable
          description: ''
    put:
      operationId: v1_hr_contrats_update
      description: |-
        GET    /api/v1/hr/contrats/{id}/ — Détail
        PUT    /api/v1/hr/contrats/{id}/ — Modifier
        DELETE /api/v1/hr/contrats/{id}/ — Résilier
      summary: Modifier un contrat
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Contrats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContratCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContratCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContratCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contrat'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Accès refusé
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Contrat introuvable
          description: ''
    delete:
      operationId: v1_hr_contrats_destroy
      description: |-
        GET    /api/v1/hr/contrats/{id}/ — Détail
        PUT    /api/v1/hr/contrats/{id}/ — Modifier
        DELETE /api/v1/hr/contrats/{id}/ — Résilier
      summary: Résilier un contrat
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Contrats
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Contrat résilié
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Accès refusé
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Contrat introuvable
          description: ''
  /api/v1/hr/declarations/cnps/:
    get:
      operationId: v1_hr_declarations_cnps_retrieve
      description: 'Génère la déclaration mensuelle CNPS pour export. Inclut pour
        chaque employé : numéro CNPS, salaire brut, cotisations salariales et patronales
        calculées selon les taux légaux Cameroun 2024 (plafond 750 000 XAF/mois).
        Accès réservé au RH Manager ou Comptable.'
      summary: Déclaration mensuelle CNPS
      parameters:
      - in: query
        name: annee
        schema:
          type: integer
        description: 'Année. Défaut : année courante.'
      - in: query
        name: mois
        schema:
          type: integer
        description: 'Mois (1-12). Défaut : mois précédent.'
      tags:
      - Déclarations Réglementaires
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Liste des employés avec cotisations CNPS
          description: ''
  /api/v1/hr/declarations/irpp/:
    get:
      operationId: v1_hr_declarations_irpp_retrieve
      description: Calcule l'IRPP mensuel estimé par employé selon le barème progressif
        DGI Cameroun 2024. Inclut la déduction forfaitaire de 30% pour frais professionnels.
        Résultat non contractuel — dépend des charges de famille. Accès réservé au
        RH Manager ou Comptable.
      summary: Simulation IRPP mensuel
      parameters:
      - in: query
        name: annee
        schema:
          type: integer
        description: Année.
      - in: query
        name: mois
        schema:
          type: integer
        description: Mois (1-12).
      tags:
      - Déclarations Réglementaires
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: IRPP estimé par employé
          description: ''
  /api/v1/hr/demandes-document/:
    get:
      operationId: v1_hr_demandes_document_list
      description: 'Liste toutes les demandes de document du tenant. Par défaut :
        demandes en attente de traitement.'
      summary: Toutes les demandes de documents (RH)
      parameters:
      - in: query
        name: statut
        schema:
          type: string
        description: 'Filtrer par statut — défaut : en_attente'
      - in: query
        name: type_document
        schema:
          type: string
        description: 'Filtrer par type : attestation_travail, attestation_salaire,
          bulletin_paie_copie'
      tags:
      - Demandes Documents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DemandeDocument'
          description: ''
  /api/v1/hr/demandes-document/{id}/approuver/:
    post:
      operationId: v1_hr_demandes_document_approuver_create
      description: Approuve la demande et génère les données structurées du document.
        L'employé peut ensuite télécharger son document via GET /me/demandes-document/{pk}/.
      summary: Approuver une demande de document
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Demandes Documents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandeDocument'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Demande déjà traitée
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Demande introuvable
          description: ''
  /api/v1/hr/demandes-document/{id}/rejeter/:
    post:
      operationId: v1_hr_demandes_document_rejeter_create
      description: Rejette la demande avec un motif expliqué à l'employé. Le motif
        est visible dans l'espace self-service de l'employé.
      summary: Rejeter une demande de document
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Demandes Documents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejeterDemandeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RejeterDemandeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RejeterDemandeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandeDocument'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Demande déjà traitée ou motif manquant
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Demande introuvable
          description: ''
