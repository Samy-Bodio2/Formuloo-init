components:
  schemas:
    BlankEnum:
      enum:
      - ''
    Conge:
      type: object
      description: |-
        Serializer complet pour liste et détail.
        GET /hr/leaves/
        GET /hr/leaves/{id}/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        employee:
          type: string
          readOnly: true
        type_conge:
          allOf:
          - $ref: '#/components/schemas/TypeCongeD98Enum'
          description: |-
            Type de congé demandé

            * `annuel` - Congé annuel
            * `maladie` - Congé maladie
            * `maternite` - Congé maternité
            * `paternite` - Congé paternité
            * `sans_solde` - Congé sans solde
            * `exceptionnel` - Congé exceptionnel
            * `recuperation` - Récupération
            * `formation` - Formation
            * `deces` - Décès famille
        start_date:
          type: string
          format: date
          description: Date de début du congé
        end_date:
          type: string
          format: date
          description: Date de fin du congé
        days:
          type: integer
          readOnly: true
          description: Nombre de jours calendaires — calculé auto
        jours_ouvres:
          type: integer
          readOnly: true
          description: Nombre de jours ouvrés — calculé auto
        reason:
          type: string
          nullable: true
          description: Motif de la demande de congé
        piece_justificative:
          type: string
          format: uri
          nullable: true
          description: URL du justificatif (arrêt maladie, etc.)
          maxLength: 200
        status:
          allOf:
          - $ref: '#/components/schemas/CongeStatusEnum'
          readOnly: true
          description: |-
            Statut de la demande

            * `pending` - En attente
            * `approved` - Approuvé
            * `rejected` - Rejeté
            * `annule` - Annulé
        approved_by:
          type: string
          readOnly: true
        approved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Date et heure de la décision
        commentaire_decision:
          type: string
          readOnly: true
          nullable: true
          description: Commentaire d'approbation ou motif de rejet
        remplacant:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - approved_at
      - approved_by
      - commentaire_decision
      - created_at
      - days
      - employee
      - end_date
      - id
      - jours_ouvres
      - remplacant
      - start_date
      - status
      - type_conge
      - updated_at
    CongeApprouverRequest:
      type: object
      description: |-
        Serializer pour approuver une demande de congé.
        POST /hr/leaves/{id}/approve/
      properties:
        commentaire:
          type: string
          description: Commentaire optionnel
    CongeCreateRequest:
      type: object
      description: |-
        Serializer pour soumettre une demande de congé.
        POST /hr/leaves/
        PUT  /hr/leaves/{id}/

        Validations :
        1. Date de fin après date de début
        2. Pas de chevauchement avec congés existants
        3. Remplaçant existe et est actif
      properties:
        type_conge:
          allOf:
          - $ref: '#/components/schemas/TypeCongeD98Enum'
          description: |-
            Type de congé demandé

            * `annuel` - Congé annuel
            * `maladie` - Congé maladie
            * `maternite` - Congé maternité
            * `paternite` - Congé paternité
            * `sans_solde` - Congé sans solde
            * `exceptionnel` - Congé exceptionnel
            * `recuperation` - Récupération
            * `formation` - Formation
            * `deces` - Décès famille
        start_date:
          type: string
          format: date
          description: Date de début du congé
        end_date:
          type: string
          format: date
          description: Date de fin du congé
        reason:
          type: string
          nullable: true
          description: Motif de la demande de congé
        piece_justificative:
          type: string
          format: uri
          nullable: true
          description: URL du justificatif (arrêt maladie, etc.)
          maxLength: 200
        remplacant_id:
          type: string
          format: uuid
          nullable: true
          description: UUID de l'employé remplaçant
      required:
      - end_date
      - start_date
      - type_conge
    CongeRejeterRequest:
      type: object
      description: |-
        Serializer pour rejeter une demande de congé.
        POST /hr/leaves/{id}/reject/
        Le motif est obligatoire.
      properties:
        reason:
          type: string
          minLength: 1
          description: Motif obligatoire du rejet
      required:
      - reason
    CongeStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      - annule
      type: string
      description: |-
        * `pending` - En attente
        * `approved` - Approuvé
        * `rejected` - Rejeté
        * `annule` - Annulé
    Contrat:
      type: object
      description: |-
        Serializer complet pour liste et détail.
        GET /hr/contrats/
        GET /hr/contrats/{id}/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        numero:
          type: string
          readOnly: true
          description: 'Numéro unique auto-généré — ex: CTR-2024-001'
        employee:
          type: string
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          description: |-
            Type de contrat conforme CDC

            * `CDI` - Contrat à Durée Indéterminée
            * `CDD` - Contrat à Durée Déterminée
            * `Interim` - Intérim
            * `Stage` - Stage
            * `Freelance` - Freelance
        start_date:
          type: string
          format: date
          description: Date de début du contrat
        end_date:
          type: string
          format: date
          nullable: true
          description: Date de fin — null pour les CDI
        trial_period:
          type: integer
          maximum: 2147483647
