      operationId: v1_hr_employes_conges_list
      description: |-
        GET /api/v1/hr/employes/{id}/conges/
        Congés d'un employé spécifique.
      summary: Congés d'un employé
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
