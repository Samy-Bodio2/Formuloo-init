  /api/v1/hr/employes/{id}/attestation/:
    get:
      operationId: v1_hr_employes_attestation_retrieve
      description: Retourne les données brutes d'une attestation de travail pour un
        employé. Réservé au RH Manager — pour la délivrance officielle à l'employé,
        utiliser le workflow POST /me/demandes-document/ + approbation RH.
      summary: Prévisualisation attestation de travail (RH)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Déclarations Réglementaires
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Données de l'attestation de travail
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: RH Manager requis
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Employé introuvable
          description: ''
  /api/v1/hr/employes/{id}/conges/:
