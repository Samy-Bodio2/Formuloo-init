openapi: 3.0.3
info:
  title: Formuloo OS — Auth Service API
  version: 1.0.0
  description: Service d'authentification SSO pour Formuloo OS ERP
paths:
  /api/v1/auth/api-keys/:
    get:
      operationId: v1_auth_api_keys_retrieve
      description: Retourne la liste des clés API du tenant courant. La clé brute
        n'est jamais retournée.
      summary: Lister les clés API
      tags:
      - API Keys
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Liste des clés API
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
    post:
      operationId: v1_auth_api_keys_create
      description: Génère une nouvelle clé API. La clé brute est retournée UNE SEULE
        FOIS.
      summary: Créer une clé API
      tags:
      - API Keys
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Clé API créée
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
  /api/v1/auth/api-keys/{id}/:
    get:
      operationId: v1_auth_api_keys_retrieve_2
      description: |-
        GET    /api/v1/auth/api-keys/{id}/ — Détail
        DELETE /api/v1/auth/api-keys/{id}/ — Révoquer
      summary: Détail d'une clé API
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - API Keys
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Clé API trouvée
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Clé API introuvable
          description: ''
    delete:
      operationId: v1_auth_api_keys_destroy
      description: Désactive une clé API — elle ne pourra plus être utilisée.
      summary: Révoquer une clé API
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - API Keys
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Clé API révoquée
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Clé API introuvable
          description: ''
  /api/v1/auth/audit-logs/:
    get:
      operationId: v1_auth_audit_logs_retrieve
      description: Retourne l'historique immuable et paginé des actions du tenant.
        Lecture seule.
      summary: Lister les journaux d'audit
      tags:
      - Audit
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Liste paginée des journaux d'audit
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
    post:
      operationId: v1_auth_audit_logs_create
      description: Endpoint interne pour les services HR et Compta. Authentifié par
        X-Service-Token.
      summary: Enregistrer un événement d'audit (inter-services)
      tags:
      - Audit
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Événement enregistré
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token inter-service invalide
          description: ''
  /api/v1/auth/audit-logs/{id}/:
    get:
      operationId: v1_auth_audit_logs_retrieve_2
      description: Retourne les informations d'une entrée du journal d'audit. Lecture
        seule.
      summary: Détail d'un journal d'audit
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Audit
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Journal d'audit trouvé
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Journal introuvable
          description: ''
  /api/v1/auth/forgot-password/:
    post:
      operationId: v1_auth_forgot_password_create
      description: Envoie un lien de réinitialisation par email si le compte existe.
        Répond toujours 200 pour ne pas révéler si l'email est connu.
      summary: Mot de passe oublié
      tags:
      - Inscription & Compte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Email envoyé si le compte existe
          description: ''
  /api/v1/auth/invite/:
    post:
      operationId: v1_auth_invite_create
      description: Crée un compte employé inactif et envoie un lien d'invitation par
        email. L'employé définit son mot de passe en cliquant sur le lien (72h). Réservé
        au RH Manager.
      summary: Inviter un employé
      tags:
      - Inscription & Compte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InviteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InviteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Invitation envoyée
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Email déjà utilisé ou rôles invalides
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Réservé au RH Manager
          description: ''
  /api/v1/auth/invite/accept/:
    post:
      operationId: v1_auth_invite_accept_create
      description: Activates the invited employee account by setting a password. Le
        token d'invitation est valable 72h et à usage unique.
      summary: Accepter une invitation
      tags:
      - Inscription & Compte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Compte activé — connexion possible
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Token invalide/expiré ou mots de passe non conformes
          description: ''
  /api/v1/auth/invite/preview/:
    get:
      operationId: v1_auth_invite_preview_retrieve
      description: Retourne les informations de l'invitation (organisation, rôle,
        modules, inviteur, expiration) à partir du code à 6 chiffres, sans le consommer.
      summary: Prévisualiser une invitation
      parameters:
      - in: query
        name: code
        schema:
          type: string
        description: Code à 6 chiffres reçu par email
        required: true
      tags:
      - Inscription & Compte
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Invitation valide — détails retournés
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Code manquant, invalide ou invitation expirée/déjà utilisée
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Code introuvable
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Authentification par email et mot de passe. Retourne un access
        token et un refresh token.
      summary: Connexion utilisateur
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Connexion réussie — tokens JWT retournés
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Credentials invalides
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: Blackliste le refresh token. L'access token expire naturellement.
      summary: Déconnexion utilisateur
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Déconnexion réussie
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Token invalide
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: Retourne le profil de l'utilisateur connecté.
      summary: Profil utilisateur courant
      tags:
      - Authentification
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
    patch:
      operationId: v1_auth_me_partial_update
      description: Modifie le profil de l'utilisateur connecté.
      summary: Modifier le profil
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMeRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
  /api/v1/auth/me/changer-mot-de-passe/:
    post:
      operationId: v1_auth_me_changer_mot_de_passe_create
      description: Change le mot de passe de l'utilisateur connecté.
      summary: Changer le mot de passe
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangerMotDePasseRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangerMotDePasseRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangerMotDePasseRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Mot de passe modifié
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Ancien mot de passe incorrect
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
  /api/v1/auth/organisations/:
    get:
      operationId: v1_auth_organisations_list
      description: Retourne la liste de toutes les organisations. Réservé au SUPER_ADMIN.
      summary: Lister les organisations
      tags:
      - Organisations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organisation'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Permissions insuffisantes
          description: ''
    post:
      operationId: v1_auth_organisations_create
      description: Crée une nouvelle organisation (PME cliente). Réservé au SUPER_ADMIN.
      summary: Créer une organisation
      tags:
      - Organisations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganisationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganisationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganisationCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Permissions insuffisantes
          description: ''
  /api/v1/auth/organisations/{id}/:
    get:
      operationId: v1_auth_organisations_retrieve
      description: |-
        GET    /api/v1/auth/organisations/{id}/ — Détail
        PUT    /api/v1/auth/organisations/{id}/ — Modifier
        DELETE /api/v1/auth/organisations/{id}/ — Supprimer
        Réservé au SUPER_ADMIN.
      summary: Détail d'une organisation
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organisations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Organisation introuvable
          description: ''
    put:
      operationId: v1_auth_organisations_update
      description: |-
        GET    /api/v1/auth/organisations/{id}/ — Détail
        PUT    /api/v1/auth/organisations/{id}/ — Modifier
        DELETE /api/v1/auth/organisations/{id}/ — Supprimer
        Réservé au SUPER_ADMIN.
      summary: Modifier une organisation
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organisations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganisationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganisationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganisationCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Organisation introuvable
          description: ''
    delete:
      operationId: v1_auth_organisations_destroy
      description: |-
        GET    /api/v1/auth/organisations/{id}/ — Détail
        PUT    /api/v1/auth/organisations/{id}/ — Modifier
        DELETE /api/v1/auth/organisations/{id}/ — Supprimer
        Réservé au SUPER_ADMIN.
      summary: Supprimer une organisation
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Organisations
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Organisation supprimée
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Organisation introuvable
          description: ''
  /api/v1/auth/permissions/:
    get:
      operationId: v1_auth_permissions_list
      description: Retourne toutes les permissions disponibles. Lecture seule.
      summary: Lister les permissions
      tags:
      - Permissions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
  /api/v1/auth/permissions/{id}/:
    get:
      operationId: v1_auth_permissions_retrieve
      description: |-
        GET /api/v1/auth/permissions/{id}/
        Détail d'une permission.
        Lecture seule — immuable.
      summary: Détail d'une permission
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Permissions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Permission introuvable
          description: ''
  /api/v1/auth/refresh-tokens/:
    get:
      operationId: v1_auth_refresh_tokens_retrieve
      description: Retourne la liste des sessions actives (refresh tokens non blacklistés)
        de l'utilisateur connecté.
      summary: Lister les sessions actives
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Liste des sessions actives
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
  /api/v1/auth/refresh-tokens/{id}/:
    delete:
      operationId: v1_auth_refresh_tokens_destroy
      description: Blackliste un refresh token — révoque une session active.
      summary: Révoquer une session
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Session révoquée
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Session introuvable
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: Crée une nouvelle organisation (tenant) et son administrateur RH
        Manager. Un email de vérification est envoyé à l'adresse fournie. Le compte
        est actif mais non vérifié jusqu'au clic sur le lien.
      summary: Inscription — créer une PME
      tags:
      - Inscription & Compte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Compte créé — email de vérification envoyé
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Données invalides (slug déjà pris, email existant, etc.)
          description: ''
  /api/v1/auth/resend-verification/:
    post:
      operationId: v1_auth_resend_verification_create
      description: Génère et envoie un nouveau lien de vérification. Répond toujours
        200 même si l'email est inconnu (anti-énumération).
      summary: Renvoyer le lien de vérification email
      tags:
      - Inscription & Compte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Email envoyé (si le compte existe et n'est pas vérifié)
          description: ''
  /api/v1/auth/reset-password/:
    post:
      operationId: v1_auth_reset_password_create
      description: Définit un nouveau mot de passe via le token reçu par email. Le
        token RESET_PASSWORD expire après 2h et est à usage unique.
      summary: Réinitialiser le mot de passe
      tags:
      - Inscription & Compte
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Mot de passe réinitialisé
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Token invalide/expiré ou mot de passe non conforme
          description: ''
  /api/v1/auth/roles/:
    get:
      operationId: v1_auth_roles_list
      description: Retourne la liste des rôles du tenant courant.
      summary: Lister les rôles
      tags:
      - Rôles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Token JWT absent ou invalide
