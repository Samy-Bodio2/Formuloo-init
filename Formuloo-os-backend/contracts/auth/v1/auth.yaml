components:
  schemas:
    AcceptInvitationRequest:
      type: object
      description: |-
        Activation du compte employé via le token d'invitation.
        L'employé choisit son mot de passe lors de cette étape.
      properties:
        code:
          type: string
          minLength: 1
          description: Code à 6 chiffres reçu par email
          pattern: ^\d{6}$
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - code
      - confirm_password
      - password
    ActionEnum:
      enum:
      - read
      - write
      - delete
      - validate
      - close
      type: string
      description: |-
        * `read` - Lire
        * `write` - Écrire
        * `delete` - Supprimer
        * `validate` - Valider
        * `close` - Clôturer
    ChangerMotDePasseRequest:
      type: object
      description: |-
        Serializer pour le changement de mot de passe.
        POST /api/v1/auth/me/changer-mot-de-passe/
      properties:
        ancien_mot_de_passe:
          type: string
          writeOnly: true
          minLength: 1
        nouveau_mot_de_passe:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - ancien_mot_de_passe
      - nouveau_mot_de_passe
    ForgotPasswordRequest:
      type: object
      description: |-
        Demande de réinitialisation du mot de passe.
        Envoie un lien de reset par email si le compte existe.
        Ne révèle jamais si l'email est connu (protection anti-énumération).
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    InviteRequest:
      type: object
      description: |-
        Invitation d'un employé par le RH Manager.

        Crée un compte User inactif (sans mot de passe)
        et envoie un lien d'activation par email.
        L'employé définit son mot de passe en acceptant l'invitation.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          minLength: 1
        roles:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 50
          description: 'Liste des codes de rôle à assigner (ex: ["EMPLOYE", "MANAGER"])'
          minItems: 1
      required:
      - email
      - first_name
      - last_name
      - roles
    LocaleEnum:
      enum:
      - fr
      - en
      - pt
      type: string
      description: |-
        * `fr` - Français
        * `en` - English
        * `pt` - Português
    LoginRequest:
      type: object
      description: |-
        Serializer pour le login email/password.
        Valide les credentials et retourne l'utilisateur.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    LogoutRequest:
      type: object
      description: |-
        Serializer pour le logout.
        Blackliste le refresh token.
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    Me:
      type: object
      description: |-
        Serializer pour le profil utilisateur courant.
        GET /api/v1/auth/me/
        PATCH /api/v1/auth/me/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        tenant_id:
          type: string
          readOnly: true
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        is_active:
          type: boolean
          readOnly: true
        is_verified:
          type: boolean
          readOnly: true
        roles:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - first_name
      - id
      - is_active
      - is_verified
      - last_name
      - roles
      - tenant_id
      - updated_at
    ModuleEnum:
      enum:
      - auth
      - hr
      - compta
      - crm
      - stock
      - analytics
      type: string
      description: |-
        * `auth` - Authentification
        * `hr` - Ressources Humaines
        * `compta` - Comptabilité
        * `crm` - CRM
        * `stock` - Stock
        * `analytics` - Analytics
    Organisation:
      type: object
      description: |-
        Serializer complet pour les organisations.
        Utilisé pour la liste et le détail.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          maxLength: 255
        currency:
          type: string
          maxLength: 10
        locale:
          $ref: '#/components/schemas/LocaleEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - slug
      - updated_at
    OrganisationCreateRequest:
      type: object
      description: |-
        Serializer pour la création d'une organisation.
        POST /api/v1/auth/organisations/
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          minLength: 1
          maxLength: 255
        currency:
          type: string
          minLength: 1
          maxLength: 10
        locale:
          $ref: '#/components/schemas/LocaleEnum'
      required:
      - name
      - slug
    PatchedMeRequest:
      type: object
      description: |-
        Serializer pour le profil utilisateur courant.
        GET /api/v1/auth/me/
        PATCH /api/v1/auth/me/
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
    Permission:
      type: object
      description: |-
        Serializer pour les permissions.
        GET /api/v1/auth/permissions/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        module:
          $ref: '#/components/schemas/ModuleEnum'
        action:
          $ref: '#/components/schemas/ActionEnum'
        resource:
          type: string
          maxLength: 100
        code:
          type: string
          readOnly: true
      required:
      - action
      - code
      - id
      - module
      - resource
    RegisterRequest:
      type: object
      description: |-
        Inscription publique : crée une nouvelle PME (Organisation)
        et son premier utilisateur avec le rôle RH_MANAGER.

        C'est le seul endpoint Auth qui ne nécessite pas de JWT.
        Un email de vérification est envoyé après la création.
      properties:
        company_name:
          type: string
          minLength: 1
          description: 'Nom de la PME (ex: PME Cameroun SARL)'
          maxLength: 255
        company_slug:
          type: string
          minLength: 1
          description: 'Identifiant URL unique de la PME (ex: pme-cameroun)'
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - company_name
      - company_slug
      - confirm_password
      - email
      - first_name
      - last_name
      - password
    ResendVerificationRequest:
      type: object
      description: |-
        Renvoie un email de vérification à l'adresse fournie.
        Ne révèle pas si l'email existe (protection contre l'énumération).
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    ResetPasswordRequest:
      type: object
      description: Réinitialisation effective du mot de passe via le token de reset.
      properties:
        code:
          type: string
          minLength: 1
          description: Code à 6 chiffres reçu par email
          pattern: ^\d{6}$
        nouveau_mot_de_passe:
          type: string
          writeOnly: true
          minLength: 8
        confirm_mot_de_passe:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - code
      - confirm_mot_de_passe
      - nouveau_mot_de_passe
    RoleCreateRequest:
      type: object
      description: |-
        Serializer pour la création d'un rôle.
        POST /api/v1/auth/roles/
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        code:
          type: string
          minLength: 1
          maxLength: 100
        permissions:
          type: array
          items:
            type: string
            minLength: 1
      required:
      - code
      - name
    RoleDetail:
      type: object
      description: |-
        Serializer pour le détail d'un rôle.
        GET /api/v1/auth/roles/{id}/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 100
        is_system:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - permissions
      - updated_at
    RoleList:
      type: object
      description: |-
        Serializer pour la liste des rôles.
        GET /api/v1/auth/roles/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 100
        is_system:
          type: boolean
        permissions:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - permissions
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    UserCreateRequest:
      type: object
      description: |-
        Serializer pour la création d'un utilisateur.
        POST /api/v1/auth/utilisateurs/

        - Si l'utilisateur connecté est ADMIN_PME :
          tenant extrait automatiquement du JWT
        - Si l'utilisateur connecté est SUPER_ADMIN :
          tenant_id doit être fourni dans le body
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        password:
          type: string
          writeOnly: true
          minLength: 8
        role:
          type: string
          writeOnly: true
          minLength: 1
        tenant_id:
          type: string
          format: uuid
          writeOnly: true
      required:
      - email
      - first_name
      - last_name
      - password
    UserDetail:
      type: object
      description: |-
        Serializer pour le détail d'un utilisateur.
        GET /api/v1/auth/utilisateurs/{id}/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 255
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        is_active:
          type: boolean
        is_verified:
          type: boolean
        roles:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - first_name
      - id
      - last_name
      - roles
      - updated_at
    UserList:
      type: object
      description: |-
        Serializer pour la liste des utilisateurs.
        GET /api/v1/auth/utilisateurs/
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 255
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        is_active:
          type: boolean
        is_verified:
          type: boolean
        roles:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - first_name
      - id
      - last_name
      - roles
    UserUpdateRequest:
      type: object
      description: |-
        Serializer pour la modification d'un utilisateur.
        PUT /api/v1/auth/utilisateurs/{id}/
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        is_active:
          type: boolean
      required:
      - first_name
      - last_name
    VerifyEmailRequest:
      type: object
      description: |-
        Vérifie l'adresse email d'un utilisateur via le code à 6 chiffres
        reçu par email après l'inscription ou après renvoi.
      properties:
        code:
          type: string
          minLength: 1
          description: Code à 6 chiffres reçu par email
          pattern: ^\d{6}$
      required:
      - code
