# ============================================================
# Pipeline GitLab CI/CD — Service Auth
# Formuloo OS — ERP cloud pour PME africaines
# ============================================================
# Étapes :
#   1. lint    → vérification style PEP8
#   2. test    → tests pytest + couverture
#   3. build   → construction image Docker
#   4. deploy  → déploiement staging
# ============================================================

stages:
  - lint
  - test
  - build
  - deploy

# ── VARIABLES GLOBALES ────────────────────────────────────
variables:
  PYTHON_VERSION: "3.11.9"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE/auth:$CI_COMMIT_SHORT_SHA"
  POSTGRES_DB: "db_auth_test"
  POSTGRES_USER: "taskuser"
  POSTGRES_PASSWORD: "taskpassword"
  POSTGRES_HOST_AUTH_METHOD: "trust"

# ── IMAGE DE BASE ─────────────────────────────────────────
default:
  image: python:3.11.9-slim
  before_script:
    - pip install --no-cache-dir --upgrade pip
    - pip install --no-cache-dir -r requirements.txt

# ============================================================
# ÉTAPE 1 — LINT
# Vérification du style de code PEP8
# ============================================================
lint:
  stage: lint
  script:
    - echo "Vérification du style de code..."
    - ruff check .
    - black --check .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false

# ============================================================
# ÉTAPE 2 — TESTS
# Exécution des tests pytest + couverture de code
# ============================================================
test:
  stage: test
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    DB_NAME: "db_auth_test"
    DB_USER: "taskuser"
    DB_PASSWORD: "taskpassword"
    DB_HOST: "postgres"
    DB_PORT: "5432"
    REDIS_URL: "redis://localhost:6379/0"
    SECRET_KEY: "django-insecure-test-secret-key-ci-cd"
    DEBUG: "True"
    ALLOWED_HOSTS: "localhost,127.0.0.1"
    ACCESS_TOKEN_LIFETIME: "15"
    REFRESH_TOKEN_LIFETIME: "7"
  script:
    - echo "Lancement des tests pytest..."
    - pytest --cov=authentification --cov-report=xml --cov-report=term-missing
    - echo "Couverture minimale requise 80%"
    - coverage report --fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false

# ============================================================
# ÉTAPE 3 — BUILD
# Construction de l'image Docker
# ============================================================
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "Construction de l'image Docker..."
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"
    - echo "Image poussée sur le registry GitLab"
  rules:
    - if: '$CI_COMMIT_BRANCH == "letissia-chowuinou"'
  allow_failure: false

# ============================================================
# ÉTAPE 4 — DEPLOY STAGING
# Déploiement en environnement de staging
# ============================================================
deploy_staging:
  stage: deploy
  image: docker:24
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "Déploiement en staging..."
    - docker pull "$DOCKER_IMAGE"
    - docker stop formuloo_auth_staging || true
    - docker rm formuloo_auth_staging || true
    - docker run -d
        --name formuloo_auth_staging
        --env-file .env
        -p 8001:8000
        "$DOCKER_IMAGE"
    - echo "Service Auth déployé en staging sur le port 8001"
  environment:
    name: staging
    url: http://staging.formuloo.com:8001
  rules:
    - if: '$CI_COMMIT_BRANCH == "letissia-chowuinou"'
  allow_failure: true
  needs:
    - build
