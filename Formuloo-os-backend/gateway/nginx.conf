upstream auth_service {
    server formuloo-auth:8000;
}

upstream hr_service {
    server hr_api:8001;
}

upstream compta_service {
    server formuloo-compta:8002;
}

upstream gesdoc_service {
    server formuloo-gesdoc:8003;
}

server {
    listen 80;
    server_name _;

    # GesDoc accepte des uploads jusqu'à 20 Mo (voir DOCUMENT_MAX_UPLOAD_SIZE)
    client_max_body_size 25M;

    # ── Auth ────────────────────────────────────────────────
    location /api/v1/auth/ {
        proxy_pass         http://auth_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── HR ──────────────────────────────────────────────────
    location /api/v1/hr/ {
        proxy_pass         http://hr_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Compta (endpoints internes bloqués depuis l'extérieur) ─
    location ~ ^/api/v1/compta/_internal/ {
        return 403;
    }

    location /api/v1/compta/ {
        proxy_pass         http://compta_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── GesDoc (gestion documentaire OCR + blockchain) ───────
    # Préfixe attendu par le frontend : /api/v1/documents/ (pas /api/v1/gesdoc/)
    location /api/v1/documents/ {
        proxy_pass         http://gesdoc_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check passerelle ──────────────────────────────
    location /health {
        return 200 '{"status":"ok","gateway":"formuloo-os","services":["auth","hr","compta","gesdoc"]}';
        add_header Content-Type application/json;
    }

    # ── Swagger / OpenAPI (auth) ─────────────────────────────
    location /api/schema/auth/ {
        proxy_pass       http://auth_service/api/schema/;
        proxy_set_header Host $host;
    }

    # ── Swagger / OpenAPI (hr) ───────────────────────────────
    location /api/schema/hr/ {
        proxy_pass       http://hr_service/api/schema/;
        proxy_set_header Host $host;
    }

    # ── Swagger / OpenAPI (compta) ───────────────────────────
    location /api/schema/compta/ {
        proxy_pass       http://compta_service/api/schema/;
        proxy_set_header Host $host;
    }

    # ── Swagger / OpenAPI (gesdoc) ───────────────────────────
    location /api/schema/gesdoc/ {
        proxy_pass       http://gesdoc_service/api/schema/;
        proxy_set_header Host $host;
    }
}
