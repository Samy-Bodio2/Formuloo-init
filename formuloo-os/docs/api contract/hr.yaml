# ============================================================
# CONTRAT OPENAPI 3.0 — HR SERVICE
# ============================================================
# Projet      : Formuloo OS — ERP cloud pour PME africaines
# Service     : HR Service (Ressources Humaines)
# Version     : 2.1.0
# Auteur      : CHOWUINOU TEGUIA
# Date        : 2024-2025
# Description : Contrat complet et final du service RH.
#               Conforme au CDC Formuloo OS v1.0.
#               Gère les employés, postes, départements,
#               contrats, congés, présences et fiches de paie.
#               Toutes les données sont isolées par tenant_id.
#
# HISTORIQUE DES VERSIONS :
# v1.0.0 — Version initiale (endpoints de base)
# v2.0.0 — Version complète (UUIDs, schémas complets)
# v2.1.0 — Mise à jour CDC :
#           + Department.parent (sous-départements)
#           + GET /hr/departements/tree/ (organigramme)
#           + POST /hr/paies/run/ (génération masse)
#           + GET /hr/paies/periode/{periode}/
#           + Employee.genre → ajout Autre
#           + Employee.statut → ajout en_conge
#           + Contract.signed_at
#           + Contract.is_active
# ============================================================

openapi: "3.0.0"

# ------------------------------------------------------------
# INFORMATIONS GÉNÉRALES
# ------------------------------------------------------------
info:
  title: Formuloo OS — HR Service API
  version: 2.1.0
  description: >
    Service de gestion des Ressources Humaines de Formuloo OS.
    Gère les employés, postes, départements, contrats, congés,
    présences et fiches de paie SYSCOHADA.
    Toutes les données sont filtrées automatiquement par tenant_id
    pour garantir l'isolation multi-tenant entre les PME africaines.
    Conforme aux normes SYSCOHADA et aux réalités des PME africaines
    (gestion en XAF, CNPS, IRPP).
    Conforme au CDC Formuloo OS v1.0.
  contact:
    name: CHOWUINOU TEGUIA — Backend Developer
    email: backend@formuloo.com

# ------------------------------------------------------------
# SERVEURS
# Le service HR tourne sur le port 8001 en développement local
# ------------------------------------------------------------
servers:
  - url: http://localhost:8001/api/v1
    description: Serveur local de développement (port 8001)
  - url: https://api.formuloo.com/api/v1
    description: Serveur de production

# ------------------------------------------------------------
# TAGS — Regroupement logique des endpoints par domaine métier
# ------------------------------------------------------------
tags:
  - name: Departements
    description: Gestion des départements et de l'organigramme hiérarchique
  - name: Postes
    description: Gestion des postes et niveaux hiérarchiques
  - name: Employes
    description: CRUD complet des employés du tenant
  - name: Contrats
    description: Gestion des contrats de travail
  - name: Conges
    description: Gestion des demandes et approbations de congés
  - name: SoldesConges
    description: Suivi des soldes de congés par employé
  - name: Presences
    description: Gestion des pointages et présences
  - name: Paies
    description: Génération et consultation des fiches de paie SYSCOHADA

# ============================================================
# ENDPOINTS (PATHS)
# Convention : /api/v1/hr/{ressource}/
# Toutes les ressources sont filtrées par tenant_id (JWT)
# ============================================================
paths:

  # ==========================================================
  # DÉPARTEMENTS
  # Représente la structure organisationnelle de la PME
  # Supporte les sous-départements (parent/enfant)
  # ==========================================================

  /hr/departements/:
    get:
      tags: [Departements]
      summary: Lister les départements
      description: >
        Retourne la liste paginée de tous les départements du tenant courant.
        Inclut le nombre d'employés actifs dans chaque département.
        Filtrable par statut actif/inactif.
        Accessible à tous les rôles authentifiés.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: is_active
          in: query
          required: false
          description: Filtrer par statut actif/inactif
          schema:
            type: boolean
        - name: parent_id
          in: query
          required: false
          description: Filtrer par département parent (UUID) — null = racine
          schema:
            type: string
            format: uuid
            nullable: true
      responses:
        '200':
          description: Liste paginée des départements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDepartements'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Departements]
      summary: Créer un département
      description: >
        Crée un nouveau département dans l'organigramme du tenant.
        Peut être rattaché à un département parent pour créer
        une hiérarchie (ex: Informatique > Frontend > Mobile).
        Le tenant_id est extrait automatiquement du JWT.
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartementCreate'
            example:
              nom: Informatique
              code: INFO
              description: Département développement logiciel
              parent_id: null
              budget: 5000000
              devise: XAF
      responses:
        '201':
          description: Département créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Departement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /hr/departements/tree/:
    get:
      tags: [Departements]
      summary: Organigramme hiérarchique des départements
      description: >
        Retourne l'arbre complet des départements du tenant
        sous forme hiérarchique (parent → enfants → petits-enfants).
        Utile pour afficher l'organigramme de la PME.
        Accessible à tous les rôles authentifiés.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Arbre hiérarchique des départements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepartementTree'
              example:
                - id: uuid-info
                  nom: Informatique
                  code: INFO
                  nb_employes: 10
                  sous_departements:
                    - id: uuid-frontend
                      nom: Frontend
                      code: INFO-FRONT
                      nb_employes: 4
                      sous_departements: []
                    - id: uuid-backend
                      nom: Backend
                      code: INFO-BACK
                      nb_employes: 6
                      sous_departements: []
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hr/departements/{id}/:
    get:
      tags: [Departements]
      summary: Détail d'un département
      description: >
        Retourne les informations complètes d'un département
        incluant le responsable, le parent et le nombre d'employés.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Département trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Departement'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Departements]
      summary: Modifier un département
      description: >
        Met à jour les informations d'un département.
        Seuls les champs fournis sont modifiés.
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartementCreate'
      responses:
        '200':
          description: Département modifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Departement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Departements]
      summary: Supprimer un département
      description: >
        Désactive un département (soft delete).
        Impossible si des employés actifs y sont rattachés
        ou si des sous-départements actifs existent.
        Réservé au rôle ADMIN_PME.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '204':
          description: Département désactivé
        '400':
          description: Département contient des employés actifs ou des sous-départements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================
  # POSTES
  # Représente les postes disponibles dans l'organigramme
  # ==========================================================

  /hr/postes/:
    get:
      tags: [Postes]
      summary: Lister les postes
      description: >
        Retourne la liste de tous les postes disponibles dans le tenant.
        Filtrable par département et niveau hiérarchique.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: departement_id
          in: query
          required: false
          description: Filtrer par département (UUID)
          schema:
            type: string
            format: uuid
        - name: niveau
          in: query
          required: false
          description: Filtrer par niveau hiérarchique
          schema:
            type: string
            enum: [junior, mid, senior, manager, directeur]
        - name: is_active
          in: query
          required: false
          description: Filtrer par statut actif/inactif
          schema:
            type: boolean
      responses:
        '200':
          description: Liste des postes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostes'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Postes]
      summary: Créer un poste
      description: >
        Crée un nouveau poste dans le tenant courant.
        Définit la grille salariale (min/max) et le niveau.
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosteCreate'
            example:
              titre: Développeur Backend Senior
              code: DEV-BACK-SR
              departement_id: uuid-departement
              niveau: senior
              salaire_min: 400000
              salaire_max: 800000
              devise: XAF
      responses:
        '201':
          description: Poste créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poste'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /hr/postes/{id}/:
    get:
      tags: [Postes]
      summary: Détail d'un poste
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Poste trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poste'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Postes]
      summary: Modifier un poste
      description: >
        Met à jour les informations d'un poste.
        Seuls les champs fournis sont modifiés.
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosteCreate'
      responses:
        '200':
          description: Poste modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poste'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Postes]
      summary: Supprimer un poste
      description: >
        Désactive un poste (soft delete).
        Impossible si des employés actifs occupent ce poste.
        Réservé au rôle ADMIN_PME.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '204':
          description: Poste désactivé
        '400':
          description: Des employés actifs occupent ce poste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================
  # EMPLOYÉS
  # Entité centrale du module RH
  # Toutes les autres entités y sont rattachées
  # ==========================================================

  /hr/employes/:
    get:
      tags: [Employes]
      summary: Lister les employés du tenant
      description: >
        Retourne la liste paginée des employés appartenant au tenant
        de l'utilisateur connecté. Le filtrage par tenant_id est
        automatique via le middleware Django.
        Supporte la recherche full-text sur nom, prénom, email, matricule.
        Accessible aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: departement_id
          in: query
          required: false
          description: Filtrer par département (UUID)
          schema:
            type: string
            format: uuid
        - name: poste_id
          in: query
          required: false
          description: Filtrer par poste (UUID)
          schema:
            type: string
            format: uuid
        - name: statut
          in: query
          required: false
          description: Filtrer par statut de l'employé
          schema:
            type: string
            enum: [actif, inactif, en_conge, suspendu, demissionne, licencie]
        - name: type_employe
          in: query
          required: false
          description: Filtrer par type d'employé
          schema:
            type: string
            enum: [permanent, contractuel, stagiaire, consultant]
        - name: manager_id
          in: query
          required: false
          description: Filtrer par manager direct (UUID)
          schema:
            type: string
            format: uuid
        - name: date_embauche_min
          in: query
          required: false
          description: Date d'embauche minimale (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: date_embauche_max
          in: query
          required: false
          description: Date d'embauche maximale (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste paginée des employés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmployes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Employes]
      summary: Créer un nouvel employé
      description: >
        Crée un nouveau profil employé dans le tenant courant.
        Le tenant_id est automatiquement assigné depuis le JWT.
        Un matricule unique est auto-généré (ex: EMP-2024-001).
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeCreate'
            example:
              first_name: Jean
              last_name: Dupont
              birth_date: "1990-05-15"
              gender: M
              nationality: Camerounaise
              national_id: "123456789"
              address: Rue de la Paix, Akwa
              phone: "+237699000000"
              email: jean.dupont@pme-alpha.com
              department_id: uuid-departement
              position_id: uuid-poste
              manager_id: uuid-manager
              hire_date: "2024-01-15"
              status: actif
      responses:
        '201':
          description: Employé créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employe'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /hr/employes/{id}/:
    get:
      tags: [Employes]
      summary: Détail d'un employé
      description: >
        Retourne le profil complet d'un employé incluant
        toutes ses informations personnelles et professionnelles.
        Retourne 404 si l'employé appartient à un autre tenant
        (isolation multi-tenant garantie).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Employé trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employe'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Employes]
      summary: Modifier un employé (mise à jour partielle)
      description: >
        Met à jour partiellement les informations d'un employé.
        Seuls les champs fournis sont modifiés.
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeUpdate'
      responses:
        '200':
          description: Employé modifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employe'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Employes]
      summary: Archiver un employé (soft delete)
      description: >
        Archive un employé — il est marqué statut=inactif
        mais conservé en base pour l'historique des paies,
        congés et contrats.
        Réservé au rôle ADMIN_PME.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '204':
          description: Employé archivé avec succès
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/employes/{id}/payslips/:
    get:
      tags: [Employes]
      summary: Fiches de paie d'un employé
      description: >
        Retourne l'historique des fiches de paie d'un employé.
        Un employé peut consulter ses propres fiches de paie.
        Un RH_MANAGER et COMPTABLE voient toutes les fiches.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Liste des fiches de paie de l'employé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaies'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/employes/{id}/contrats/:
    get:
      tags: [Employes]
      summary: Contrats d'un employé
      description: >
        Retourne l'historique complet des contrats d'un employé.
        Inclut les contrats expirés et résiliés pour l'historique.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Liste des contrats de l'employé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContrats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/employes/{id}/conges/:
    get:
      tags: [Employes]
      summary: Congés d'un employé
      description: >
        Retourne l'historique des congés d'un employé.
        Un employé peut consulter ses propres congés.
        Un RH_MANAGER peut consulter les congés de tous.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Liste des congés de l'employé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConges'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================
  # CONTRATS
  # Gestion des contrats de travail des employés
  # ==========================================================

  /hr/contrats/:
    get:
      tags: [Contrats]
      summary: Lister les contrats
      description: >
        Retourne la liste paginée des contrats du tenant courant.
        Filtrable par statut, type de contrat et employé.
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: employe_id
          in: query
          required: false
          description: Filtrer par employé (UUID)
          schema:
            type: string
            format: uuid
        - name: type_contrat
          in: query
          required: false
          description: Filtrer par type de contrat
          schema:
            type: string
            enum: [CDI, CDD, Stage, Freelance, Apprentissage, Interim]
        - name: statut
          in: query
          required: false
          description: Filtrer par statut du contrat
          schema:
            type: string
            enum: [en_attente, actif, expire, resilie, suspendu]
        - name: is_active
          in: query
          required: false
          description: Filtrer les contrats actifs uniquement
          schema:
            type: boolean
      responses:
        '200':
          description: Liste paginée des contrats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContrats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Contrats]
      summary: Créer un contrat
      description: >
        Crée un nouveau contrat de travail pour un employé.
        Un numéro de contrat unique est auto-généré (ex: CTR-2024-001).
        Réservé aux rôles ADMIN_PME et RH_MANAGER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContratCreate'
            example:
              employe_id: uuid-employe
              type_contrat: CDI
              start_date: "2024-01-15"
              gross_salary: 600000
              currency: XAF
