  # ==========================================================
  # CONGÉS
  # Gestion des demandes et approbations de congés
  # ==========================================================

  /hr/leaves/:
    get:
      tags: [Conges]
      summary: Lister les demandes de congés
      description: >
        Retourne la liste paginée des demandes de congés du tenant.
        Un RH_MANAGER voit tous les congés du tenant.
        Un EMPLOYE ne voit que ses propres demandes.
        Filtrable par statut, type et période.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: employe_id
          in: query
          required: false
          description: Filtrer par employé (UUID)
          schema:
            type: string
            format: uuid
        - name: statut
          in: query
          required: false
          description: Filtrer par statut de la demande
          schema:
            type: string
            enum: [pending, approved, rejected, annule]
        - name: type_conge
          in: query
          required: false
          description: Filtrer par type de congé
          schema:
            type: string
            enum: [annuel, maladie, maternite, paternite, sans_solde, exceptionnel, recuperation, formation, deces]
        - name: date_debut
          in: query
          required: false
          description: Date de début minimale (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          required: false
          description: Date de fin maximale (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste paginée des demandes de congés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConges'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Conges]
      summary: Soumettre une demande de congé
      description: >
        Crée une nouvelle demande de congé.
        La demande est créée avec le statut pending.
        Le nombre de jours est calculé automatiquement.
        Un RH_MANAGER doit ensuite l'approuver ou la rejeter.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CongeCreate'
            example:
              type_conge: annuel
              start_date: "2024-07-01"
              end_date: "2024-07-15"
              reason: Congé annuel estival
      responses:
        '201':
          description: Demande de congé soumise avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conge'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hr/leaves/{id}/:
    get:
      tags: [Conges]
      summary: Détail d'une demande de congé
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Demande de congé trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conge'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Conges]
      summary: Modifier une demande de congé
      description: >
        Modifie une demande de congé en statut pending uniquement.
        Impossible de modifier une demande déjà approuvée ou rejetée.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CongeCreate'
      responses:
        '200':
          description: Demande modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conge'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Conges]
      summary: Annuler une demande de congé
      description: >
        Annule une demande de congé en statut pending uniquement.
        Impossible d'annuler une demande déjà approuvée.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '204':
          description: Demande annulée
        '400':
          description: Impossible d'annuler une demande approuvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/leaves/{id}/approve/:
    post:
      tags: [Conges]
      summary: Approuver une demande de congé
      description: >
        Change le statut de pending à approved.
        Décrémente automatiquement le solde de congés de l'employé.
        Met à jour le statut de l'employé à en_conge pendant la période.
        Réservé aux rôles RH_MANAGER et ADMIN_PME.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                commentaire:
                  type: string
                  description: Commentaire optionnel de l'approbation
      responses:
        '200':
          description: Congé approuvé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conge'
        '400':
          description: Demande déjà traitée ou solde insuffisant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/leaves/{id}/reject/:
    post:
      tags: [Conges]
      summary: Rejeter une demande de congé
      description: >
        Change le statut de pending à rejected.
        Un motif de rejet est obligatoire.
        Réservé aux rôles RH_MANAGER et ADMIN_PME.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Motif obligatoire du rejet
      responses:
        '200':
          description: Congé rejeté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conge'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

