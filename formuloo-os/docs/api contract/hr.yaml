  # ==========================================================
  # FICHES DE PAIE (PAYROLL)
  # Génération et consultation des fiches de paie SYSCOHADA
  # ==========================================================

  /hr/payroll/:
    get:
      tags: [Paies]
      summary: Lister les fiches de paie
      description: >
        Retourne la liste paginée des fiches de paie du tenant.
        Un EMPLOYE ne voit que ses propres fiches.
        Un COMPTABLE et RH_MANAGER voient toutes les fiches.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: employe_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: mois
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: annee
          in: query
          required: false
          schema:
            type: integer
            example: 2024
        - name: statut
          in: query
          required: false
          schema:
            type: string
            enum: [brouillon, valide, paye]
      responses:
        '200':
          description: Liste paginée des fiches de paie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaies'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Paies]
      summary: Générer une fiche de paie
      description: >
        Génère une fiche de paie pour un employé et un mois donné.
        Le salaire net est calculé automatiquement selon SYSCOHADA :
        net = brut + primes - cnps - irpp - autres_deductions.
        Réservé aux rôles RH_MANAGER et COMPTABLE.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaieCreate'
      responses:
        '201':
          description: Fiche de paie générée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paie'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /hr/payroll/run/:
    post:
      tags: [Paies]
      summary: Lancer la génération de paie en masse
      description: >
        Lance la génération automatique des fiches de paie
        pour TOUS les employés actifs du tenant pour un mois donné.
        Tâche asynchrone — retourne un job_id pour suivi.
        Réservé aux rôles RH_MANAGER et COMPTABLE.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mois, annee]
              properties:
                mois:
                  type: integer
                  minimum: 1
                  maximum: 12
                  description: Mois de la paie (1-12)
                annee:
                  type: integer
                  description: Année de la paie
                  example: 2024
            example:
              mois: 6
              annee: 2024
      responses:
        '202':
          description: Génération lancée en arrière-plan
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: Identifiant du job pour suivre l'avancement
                  message:
                    type: string
                    example: Génération de paie lancée pour 06/2024
                  nb_employes:
                    type: integer
                    description: Nombre d'employés concernés
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /hr/payroll/periode/{periode}/:
    get:
      tags: [Paies]
      summary: Fiches de paie d'une période
      description: >
        Retourne toutes les fiches de paie d'une période donnée.
        Format de la période : YYYY-MM (ex: 2024-06).
        Accessible aux rôles RH_MANAGER et COMPTABLE.
      security:
        - bearerAuth: []
      parameters:
        - name: periode
          in: path
          required: true
          description: Période au format YYYY-MM
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: "2024-06"
      responses:
        '200':
          description: Fiches de paie de la période
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaies'
        '400':
          description: Format de période invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /hr/payroll/{id}/:
    get:
      tags: [Paies]
      summary: Détail d'une fiche de paie
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Fiche de paie trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paie'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Paies]
      summary: Modifier une fiche de paie
      description: >
        Modifie une fiche de paie en statut brouillon uniquement.
        Impossible de modifier une fiche validée ou payée.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaieCreate'
      responses:
        '200':
          description: Fiche modifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paie'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Paies]
      summary: Supprimer une fiche de paie
      description: >
        Supprime une fiche en statut brouillon uniquement.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '204':
          description: Fiche supprimée
        '400':
          description: Impossible de supprimer une fiche validée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/payroll/{id}/valider/:
    post:
      tags: [Paies]
      summary: Valider une fiche de paie
      description: >
        Change le statut de brouillon à valide.
        Déclenche un événement vers le service Comptabilité
        pour la génération de l'écriture SYSCOHADA.
        Réservé aux rôles RH_MANAGER et COMPTABLE.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Fiche de paie validée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paie'
        '400':
          description: Fiche déjà validée ou payée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /hr/payroll/{id}/payer/:
    post:
      tags: [Paies]
      summary: Marquer une fiche comme payée
      description: >
        Change le statut de valide à paye.
        Enregistre la date et le mode de paiement.
        Réservé aux rôles COMPTABLE et ADMIN_PME.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode_paiement]
              properties:
                mode_paiement:
                  type: string
                  enum: [virement, especes, mobile_money, cheque]
      responses:
        '200':
          description: Fiche marquée comme payée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paie'
        '400':
          description: Fiche non validée ou déjà payée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ============================================================
# COMPOSANTS RÉUTILISABLES
# ============================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Token JWT émis par Keycloak (OAuth2/OIDC).
        Format : Authorization: Bearer <access_token>.
        Durée de vie : 15 minutes.
        Contient : user_id, tenant_id, roles.

  # ----------------------------------------------------------
  # PARAMÈTRES RÉUTILISABLES
  # ----------------------------------------------------------
  parameters:

    UuidId:
      name: id
      in: path
      required: true
      description: Identifiant unique UUID de la ressource
      schema:
        type: string
        format: uuid
        example: "4388ffa0-c5fa-4136-9270-0abadc873747"

    Page:
      name: page
      in: query
      required: false
      description: Numéro de page (commence à 1)
      schema:
        type: integer
        default: 1
        minimum: 1

    PageSize:
      name: page_size
      in: query
      required: false
      description: Nombre d'éléments par page (max 100)
      schema:
        type: integer
        default: 20
        maximum: 100

    Search:
      name: search
      in: query
      required: false
      description: Recherche full-text sur les champs principaux
      schema:
        type: string

  # ----------------------------------------------------------
  # SCHÉMAS DE DONNÉES
  # ----------------------------------------------------------
  schemas:

    # ── DÉPARTEMENT ───────────────────────────────────────

    Departement:
      type: object
      description: >
        Département de l'organigramme d'une PME.
        Supporte la hiérarchie parent/enfant pour les sous-départements.
      properties:
        id:
          type: string
          format: uuid
          description: Identifiant unique UUID
        nom:
          type: string
          description: Nom du département
          example: Informatique
        code:
          type: string
          description: Code unique du département dans le tenant
          example: INFO
        description:
          type: string
          nullable: true
          description: Description du rôle du département
        parent:
          $ref: '#/components/schemas/DepartementBrief'
          nullable: true
          description: Département parent — null si département racine
        responsable:
          $ref: '#/components/schemas/EmployeBrief'
          nullable: true
          description: Responsable du département
        budget:
          type: number
          format: decimal
          nullable: true
          description: Budget annuel alloué au département
        devise:
          type: string
          default: XAF
          description: Devise du budget
        nb_employes:
          type: integer
          description: Nombre d'employés actifs — calculé dynamiquement
        is_active:
          type: boolean
          description: Indique si le département est actif
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DepartementTree:
      type: object
      description: Département avec ses sous-départements (vue arborescente)
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
        code:
          type: string
        nb_employes:
          type: integer
        sous_departements:
          type: array
          items:
            $ref: '#/components/schemas/DepartementTree'
          description: Sous-départements enfants (récursif)

    DepartementCreate:
      type: object
      required: [nom, code]
      properties:
        nom:
          type: string
          description: Nom du département
        code:
          type: string
          description: Code unique dans le tenant
        description:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: UUID du département parent — null si racine
        responsable_id:
          type: string
          format: uuid
          nullable: true
          description: UUID de l'employé responsable
        budget:
          type: number
          nullable: true
        devise:
          type: string
          default: XAF

    DepartementBrief:
      type: object
      description: Version simplifiée du département pour les références
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
        code:
          type: string

    PaginatedDepartements:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Departement'

    # ── POSTE ─────────────────────────────────────────────

    Poste:
      type: object
      description: Poste disponible dans l'organigramme
      properties:
        id:
          type: string
          format: uuid
        departement:
          $ref: '#/components/schemas/DepartementBrief'
        titre:
          type: string
          description: Intitulé du poste
          example: Développeur Backend Senior
        code:
          type: string
          description: Code unique du poste
          example: DEV-BACK-SR
        description:
          type: string
          nullable: true
        niveau:
          type: string
          enum: [junior, mid, senior, manager, directeur]
          description: Niveau hiérarchique du poste
        salaire_min:
          type: number
          nullable: true
          description: Salaire minimum pour ce poste
        salaire_max:
          type: number
          nullable: true
          description: Salaire maximum pour ce poste
        devise:
          type: string
          default: XAF
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PosteCreate:
      type: object
      required: [titre, code, departement_id, niveau]
      properties:
        titre:
          type: string
        code:
          type: string
        departement_id:
          type: string
          format: uuid
        description:
          type: string
          nullable: true
        niveau:
          type: string
          enum: [junior, mid, senior, manager, directeur]
        salaire_min:
          type: number
          nullable: true
        salaire_max:
          type: number
          nullable: true
        devise:
          type: string
          default: XAF

    PosteBrief:
      type: object
      description: Version simplifiée du poste pour les références
      properties:
        id:
          type: string
          format: uuid
        titre:
          type: string
        code:
          type: string
        niveau:
          type: string
          enum: [junior, mid, senior, manager, directeur]

    PaginatedPostes:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Poste'

    # ── EMPLOYÉ ───────────────────────────────────────────

    Employe:
      type: object
      description: >
        Profil complet d'un employé d'une PME.
        Conforme au CDC Formuloo OS v1.0.
        Toutes les données sont isolées par tenant_id.
      properties:
        id:
          type: string
          format: uuid
        employee_number:
          type: string
          description: Matricule unique auto-généré dans le tenant
          example: EMP-2024-001

        # ── Informations personnelles ──
        first_name:
          type: string
          description: Prénom
        last_name:
          type: string
          description: Nom de famille
        birth_date:
          type: string
          format: date
          nullable: true
          description: Date de naissance
        gender:
          type: string
          enum: [M, F, Other]
          description: Genre — M/F/Other (conforme CDC)
        nationality:
          type: string
          nullable: true
          description: Nationalité
        national_id:
          type: string
          nullable: true
          description: Numéro CNI — chiffré en base
        situation_familiale:
          type: string
          enum: [celibataire, marie, divorce, veuf]
          nullable: true
        nombre_enfants:
          type: integer
          default: 0
        numero_cnps:
          type: string
          nullable: true
          description: Numéro CNPS (Cameroun)

        # ── Coordonnées ──
        address:
          type: string
          nullable: true
          description: Adresse complète
        phone:
          type: string
          description: Téléphone professionnel
          example: "+237699000000"
        email:
          type: string
          format: email
          description: Email professionnel unique dans le tenant

        # ── Informations professionnelles ──
        department:
          $ref: '#/components/schemas/DepartementBrief'
          nullable: true
        position:
          $ref: '#/components/schemas/PosteBrief'
          nullable: true
        manager:
          $ref: '#/components/schemas/EmployeBrief'
          nullable: true
          description: Manager / supérieur hiérarchique direct
        hire_date:
          type: string
          format: date
          description: Date d'embauche
        status:
          type: string
          enum: [active, inactive, on_leave, terminated, suspended]
          description: >
            active = actif,
            inactive = inactif,
            on_leave = en congé,
            terminated = licencié/démissionné,
            suspended = suspendu
        type_employe:
          type: string
          enum: [permanent, contractuel, stagiaire, consultant]
        photo_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EmployeBrief:
      type: object
      description: Version simplifiée d'un employé pour les références
      properties:
        id:
          type: string
          format: uuid
        employee_number:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email

    EmployeCreate:
      type: object
      required: [first_name, last_name, gender, email, phone, hire_date, status]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [M, F, Other]
        nationality:
          type: string
          nullable: true
        national_id:
          type: string
          nullable: true
          description: Numéro CNI — sera chiffré automatiquement
        situation_familiale:
          type: string
          enum: [celibataire, marie, divorce, veuf]
          nullable: true
        nombre_enfants:
          type: integer
          default: 0
        numero_cnps:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
        email:
          type: string
          format: email
        department_id:
          type: string
          format: uuid
          nullable: true
        position_id:
          type: string
          format: uuid
          nullable: true
        manager_id:
          type: string
          format: uuid
          nullable: true
        hire_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, on_leave, terminated, suspended]
          default: active
        type_employe:
          type: string
          enum: [permanent, contractuel, stagiaire, consultant]
          default: permanent
        photo_url:
          type: string
          format: uri
          nullable: true

    EmployeUpdate:
      type: object
      description: Tous les champs sont optionnels — mise à jour partielle
      properties:
        first_name:
          type: string
        last_name:
          type: string
        situation_familiale:
          type: string
          enum: [celibataire, marie, divorce, veuf]
        nombre_enfants:
          type: integer
        phone:
          type: string
        address:
          type: string
        department_id:
          type: string
          format: uuid
          nullable: true
        position_id:
          type: string
          format: uuid
          nullable: true
        manager_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [active, inactive, on_leave, terminated, suspended]
        photo_url:
          type: string
          format: uri
          nullable: true

    PaginatedEmployes:
      type: object
      properties:
        count:
          type: integer
          description: Nombre total d'employés dans le tenant
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Employe'

    # ── CONTRAT ───────────────────────────────────────────

    Contrat:
      type: object
      description: Contrat de travail d'un employé — conforme CDC Formuloo
      properties:
        id:
          type: string
          format: uuid
        numero:
          type: string
          description: Numéro unique auto-généré
          example: CTR-2024-001
        employee:
          $ref: '#/components/schemas/EmployeBrief'
        type:
          type: string
          enum: [CDI, CDD, Interim, Stage, Freelance]
          description: Type de contrat conforme CDC
        start_date:
          type: string
          format: date
          description: Date de début du contrat
        end_date:
          type: string
          format: date
          nullable: true
          description: Date de fin — null pour les CDI
        gross_salary:
          type: number
          format: decimal
          description: Salaire brut mensuel
        currency:
          type: string
          default: XAF
          description: Devise (XAF, EUR, USD...)
        work_hours_per_week:
          type: integer
          default: 40
          description: Heures de travail par semaine
        trial_period:
          type: integer
          nullable: true
          description: Durée de la période d'essai en jours
        is_active:
          type: boolean
          description: Indique si le contrat est actif
        document_url:
          type: string
          format: uri
          nullable: true
          description: URL du contrat signé numérisé
        signed_at:
          type: string
          format: date-time
          nullable: true
          description: Date et heure de signature du contrat
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ContratCreate:
      type: object
      required: [employe_id, type, start_date, gross_salary]
      properties:
        employe_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [CDI, CDD, Interim, Stage, Freelance]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        gross_salary:
          type: number
        currency:
          type: string
          default: XAF
        work_hours_per_week:
          type: integer
          default: 40
        trial_period:
          type: integer
          nullable: true
        document_url:
          type: string
          format: uri
          nullable: true
        signed_at:
          type: string
          format: date-time
          nullable: true

    ContratBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        numero:
          type: string
        type:
          type: string
        is_active:
          type: boolean

    PaginatedContrats:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Contrat'

    # ── CONGÉ ─────────────────────────────────────────────

    Conge:
      type: object
      description: Demande de congé d'un employé — conforme CDC Formuloo
      properties:
        id:
          type: string
          format: uuid
        employee:
          $ref: '#/components/schemas/EmployeBrief'
        type:
          $ref: '#/components/schemas/LeaveType'
          description: Type de congé
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        days:
          type: integer
          description: Nombre de jours calculé automatiquement
        reason:
          type: string
          nullable: true
          description: Motif de la demande
        status:
          type: string
          enum: [pending, approved, rejected, annule]
          description: Statut de la demande
        approved_by:
          $ref: '#/components/schemas/EmployeBrief'
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    LeaveType:
      type: object
      description: Type de congé
      properties:
        code:
          type: string
          enum: [annuel, maladie, maternite, paternite, sans_solde, exceptionnel, recuperation, formation, deces]
        libelle:
          type: string
          example: Congé annuel

    CongeCreate:
      type: object
      required: [type_conge, start_date, end_date]
      properties:
        type_conge:
          type: string
          enum: [annuel, maladie, maternite, paternite, sans_solde, exceptionnel, recuperation, formation, deces]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        reason:
          type: string
          nullable: true

    PaginatedConges:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Conge'

    # ── SOLDE DE CONGÉS ───────────────────────────────────

    SoldeConges:
      type: object
      description: Capital congés d'un employé pour une année donnée
      properties:
        id:
          type: string
          format: uuid
        employee:
          $ref: '#/components/schemas/EmployeBrief'
        type_conge:
          type: string
          enum: [annuel, maladie, sans_solde, exceptionnel]
        annee:
          type: integer
          example: 2024
        jours_acquis:
          type: number
          format: decimal
        jours_pris:
          type: number
          format: decimal
        jours_restants:
          type: number
          format: decimal
          description: Solde restant calculé automatiquement
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedSoldesConges:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/SoldeConges'

    # ── PRÉSENCE ──────────────────────────────────────────

    Presence:
      type: object
      description: Enregistrement de présence quotidien d'un employé
      properties:
        id:
          type: string
          format: uuid
        employee:
          $ref: '#/components/schemas/EmployeBrief'
        date:
          type: string
          format: date
        heure_arrivee:
          type: string
          format: time
          nullable: true
          example: "08:00"
        heure_depart:
          type: string
          format: time
          nullable: true
          example: "17:00"
        heures_travaillees:
          type: number
          format: decimal
          nullable: true
          description: Calculé automatiquement
        heures_supplementaires:
          type: number
          format: decimal
          default: 0
        statut:
          type: string
          enum: [present, absent, retard, conge, ferie]
        commentaire:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PresenceCreate:
      type: object
      required: [employe_id, date, statut]
      properties:
        employe_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        heure_arrivee:
          type: string
          format: time
          nullable: true
        heure_depart:
          type: string
          format: time
          nullable: true
        heures_supplementaires:
          type: number
          default: 0
        statut:
          type: string
          enum: [present, absent, retard, conge, ferie]
        commentaire:
          type: string
          nullable: true

    PaginatedPresences:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Presence'

    # ── FICHE DE PAIE ─────────────────────────────────────

    Paie:
      type: object
      description: >
        Fiche de paie mensuelle conforme SYSCOHADA.
        Intègre CNPS et IRPP (contexte camerounais/africain).
        Lien vers l'écriture comptable via journal_entry_id.
      properties:
        id:
          type: string
          format: uuid
        employee:
          $ref: '#/components/schemas/EmployeBrief'
        period:
          type: string
          description: Période au format YYYY-MM
          example: "2024-06"
        mois:
          type: integer
          minimum: 1
          maximum: 12
        annee:
          type: integer

        # ── Salaire de base ──
        gross:
          type: number
          format: decimal
          description: Salaire brut total

        # ── Primes (JSON conforme CDC) ──
        bonuses:
          type: object
          description: Détail des primes en JSON
          properties:
            prime_transport:
              type: number
              default: 0
            prime_logement:
              type: number
              default: 0
            prime_rendement:
              type: number
              default: 0
            autres:
              type: number
              default: 0

        # ── Déductions SYSCOHADA (JSON conforme CDC) ──
        deductions:
          type: object
          description: Détail des déductions en JSON
          properties:
            cotisation_cnps:
              type: number
              default: 0
              description: CNPS — Caisse Nationale Prévoyance Sociale
            impot_irpp:
              type: number
              default: 0
              description: IRPP — Impôt Revenu Personnes Physiques
            credit_logement:
              type: number
              default: 0
            autres:
              type: number
              default: 0

        # ── Totaux ──
        net_salary:
          type: number
          format: decimal
          description: Salaire net = gross + bonuses - deductions
        currency:
          type: string
          default: XAF

        # ── Statut ──
        statut:
          type: string
          enum: [brouillon, valide, paye]
        paid_at:
          type: string
          format: date-time
          nullable: true
          description: Date de paiement effectif
        pdf_url:
          type: string
          format: uri
          nullable: true
          description: URL du bulletin de paie PDF généré

        # ── Lien Comptabilité ──
        journal_entry_id:
          type: string
          format: uuid
          nullable: true
          description: >
            ID de l'écriture comptable SYSCOHADA générée
            automatiquement dans le service Comptabilité

        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaieCreate:
      type: object
      required: [employe_id, mois, annee]
      properties:
        employe_id:
          type: string
          format: uuid
        mois:
          type: integer
          minimum: 1
          maximum: 12
        annee:
          type: integer
        bonuses:
          type: object
          properties:
            prime_transport:
              type: number
              default: 0
            prime_logement:
              type: number
              default: 0
            prime_rendement:
              type: number
              default: 0
            autres:
              type: number
              default: 0
        deductions:
          type: object
          properties:
            autres:
              type: number
              default: 0
        currency:
          type: string
          default: XAF

    PaginatedPaies:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Paie'

    # ── ERREUR ────────────────────────────────────────────

    Error:
      type: object
      description: Structure standard des erreurs — conforme GOVERNANCE.md
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Code machine de l'erreur
              example: VALIDATION_ERROR
            message:
              type: string
              description: Message lisible par l'utilisateur
            details:
              type: array
              description: Détails par champ en cas d'erreur de validation
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: Ce champ est obligatoire.

  # ----------------------------------------------------------
  # RÉPONSES RÉUTILISABLES
  # ----------------------------------------------------------
  responses:

    BadRequest:
      description: Données invalides
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: Les données fournies sont invalides.
              details:
                - field: email
                  message: Ce champ est obligatoire.

    Unauthorized:
      description: Token JWT absent, expiré ou révoqué
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: AUTHENTICATION_FAILED
              message: Token JWT invalide ou expiré.

    Forbidden:
      description: Permissions insuffisantes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: PERMISSION_DENIED
              message: Vous n'avez pas les permissions nécessaires.

    NotFound:
      description: Ressource introuvable ou appartenant à un autre tenant
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: La ressource demandée n'existe pas.